version: 2

updates:
  - package-ecosystem: nuget
    directory: "/src"
    schedule:
      interval: daily
      time: "11:00"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: dotnet-sdk
    directory: "/src"
    schedule:
      interval: daily
      time: "11:00"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
      include: "scope"
