changelog:
  exclude:
    labels:
      - ignore-for-release
      - documentation
    authors:
      - dependabot[bot]

  categories:
    - title: "🚨 Breaking Changes"
      labels:
        - "Semver-Major"
        - "breaking-change"

    - title: "🎉 New Features"
      labels:
        - "Semver-Minor"
        - enhancement
        - feature

    - title: "🐛 Bug Fixes"
      labels:
        - "Semver-Patch"
        - bug
        - fix

    - title: "📦 Dependencies"
      labels:
        - dependencies
        - nuget
        - github-actions

    - title: "🔧 Other Changes"
      labels:
        - "*"
