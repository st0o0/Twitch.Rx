name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - LICENSE.md
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - LICENSE.md

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: src/global.json

      - name: Restore
        run: dotnet restore src/Twitch.Rx.slnx

      - name: Build
        run: dotnet build src/Twitch.Rx.slnx --configuration Release --no-restore

      - name: Test with Coverage
        run: >-
          dotnet test src/Twitch.Rx.slnx
          --configuration Release
          --no-build
          --verbosity normal
          --
          --coverage
          --coverage-output-format cobertura
          --coverage-output ${{ github.workspace }}/coverage.cobertura.xml

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        if: always()
        with:
          reports: "${{ github.workspace }}/**/coverage.cobertura.xml"
          targetdir: "${{ github.workspace }}/coveragereport"
          reporttypes: "Html;MarkdownSummaryGithub"

      - name: Publish Coverage to Summary
        if: always()
        run: cat ${{ github.workspace }}/coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ${{ github.workspace }}/coveragereport
