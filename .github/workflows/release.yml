name: Release & Publish

on:
  push:
    branches: [main]

env:
  GLOBAL_JSON_PATH: "./src/global.json"
  SOLUTION_PATH: "./src/Twitch.Rx.slnx"
  PACKAGE_OUTPUT: "./packages"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          target-branch: ${{ github.ref_name }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-pack:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ${{ env.GLOBAL_JSON_PATH }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: >
          dotnet build ${{ env.SOLUTION_PATH }}
          --configuration Release
          --no-restore
          /p:Version=${{ needs.release-please.outputs.version }}
          /p:ContinuousIntegrationBuild=true

      - name: Test
        working-directory: ./src
        run: >
          dotnet test
          --configuration Release
          --no-build

      - name: Pack
        run: >
          dotnet pack src/Twitch.Rx/Twitch.Rx.csproj
          --configuration Release
          --no-build
          --output ${{ env.PACKAGE_OUTPUT }}
          /p:PackageVersion=${{ needs.release-please.outputs.version }}
          /p:PackageReleaseNotes="https://github.com/st0o0/Twitch.Rx/releases/tag/${{ needs.release-please.outputs.tag_name }}"

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.PACKAGE_OUTPUT }}/*.nupkg

  publish:
    runs-on: ubuntu-latest
    needs: [release-please, build-and-pack]
    environment: nuget
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download NuGet artifact
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v5

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./packages/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --skip-duplicate

      - name: Attach packages to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ./packages/*.nupkg
